<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Anúncios IA</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .nf { min-height: 100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: var(--space-lg); }
    .nf .glyph { width:110px; height:78px; position:relative; margin-bottom: var(--space-lg); }
    .nf .glyph .p { position:absolute; inset:0 0 18px 0; background: var(--ink); border:3px solid var(--ink); display:flex; align-items:center; justify-content:center; }
    .nf .glyph .p::before { content:"404"; font-family: var(--display); color: var(--yellow); font-size:34px; letter-spacing:.04em; }
    .nf .glyph .post { position:absolute; bottom:0; width:7px; height:24px; background: var(--frame); }
    .nf .glyph .post.l { left:30px; } .nf .glyph .post.r { right:30px; }
    .nf h1 { font-family: var(--display); font-weight:400; text-transform:uppercase; font-size: clamp(36px,7vw,60px); line-height:.92; letter-spacing:.01em; margin-bottom: var(--space-sm); }
    .nf p { color: var(--ink-2); font-size:16px; margin-bottom: var(--space-lg); max-width:420px; }
    .nf a.btn-inline { display:inline-block; padding:13px 24px; background: var(--red); color:#fff; border:2px solid var(--ink); border-radius: var(--radius-sm); font-weight:800; text-transform:uppercase; letter-spacing:.04em; font-size:14px; text-decoration:none; box-shadow:4px 4px 0 var(--ink); }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="nf">
    <div class="glyph" aria-hidden="true"><div class="p"></div><span class="post l"></span><span class="post r"></span></div>
    <h1>Espaço vazio no outdoor</h1>
    <p>A página que você procura não existe ou foi movida. Vamos te levar de volta ao estúdio.</p>
    <a href="index.html" class="btn-inline">Voltar para o Anúncios IA</a>
  </div>
</body>
</html>
